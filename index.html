<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galexia | 3D glTF Web</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="webgl" aria-label="Galexia 3D scene"></canvas>

  <main class="hero-panel">
    <p class="eyebrow">3D glTF Web Experience</p>
    <h1>Galexia</h1>
    <p>
      Explore a luminous galaxy environment built for the web with Three.js and glTF/GLB model loading.
    </p>
    <div class="actions">
      <button id="resetCamera" type="button">Reset Camera</button>
      <a href="https://github.com/fn4tanatorn/3D-gIB" target="_blank" rel="noreferrer">GitHub Repo</a>
    </div>
  </main>

  <div class="status" id="modelStatus">Loading Galexia scene...</div>

  <script type="module" src="main.js"></script>
</body>
</html>
